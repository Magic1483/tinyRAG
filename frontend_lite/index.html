<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <title>tinyRAG</title>
    <style>
        table, th, td {
            border: 1px solid black;
            padding: 0.2rem;
        }

    </style>
</head>

<body  class="overflow-hidden" onload="load()">
    <div class="p-4 h-dvh gap-2 flex flex-col">

        <div class="flex flex-row gap-2">
            <div id="side_bar" class="w-6 h-6 p-1 border-1 border flex 
                justify-center items-center cursor-pointer">
                X
            </div>
            <div id="upload" class="h-6 p-1 border-1 border flex 
                justify-center items-center cursor-pointer">
                Upload Dashboard
            </div>
        </div>

        <div class="flex flex-row gap-2 flex-1 min-h-0" >
            <!-- side bar -->
            <div class=" border-gray-400 border-1 p-2 lg:w-[20%] w-full
                flex-col gap-4 lg:flex hidden" id="workspace">
            </div>

            <!-- Right column -->
            <div class="w-full min-h-0 flex flex-col gap-4" id="r_col">
                <!-- Chat -->
                <div class="border-gray-400 border-1 gap-10 flex flex-1 min-h-0 flex-col overflow-y-scroll p-3" 
                    id="chat">
                </div>
                <div class="flex flex-row gap-2">
                    <textarea class="border border-1 p-2 h-20 whrink-0 w-full" id="input" style="background-color: white;color: black;">
                    </textarea>
                    <button class="lg:hidden flex border border-1 p-2 bg-white 
                        items-center cursor-pointer" id="btn_send">Send</button>
                </div>
            
            </div>
        </div>
    </div>

    <!-- Upload Document -->
     <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40
        hidden  " 
        id="upd" >
        <div class=" w-[95%] lg:w-1/3 h-[90%] lg:h-[40dvh] border-gray-400 window">
            <div class="title-bar border" >
                <h1 class="title">Upload Dashboard</h1>
                <button aria-label="Close" class="close" id="close_upd"
                onclick=""
                ></button>
            </div>
            <div class="w-[30dvw] h-[60dvh] bg-white p-2 block" >
                <h1></h1>
                <div class="flex flex-col gap-4 mt-4 w-full overflow-y-scroll h-40">
                    <table>
                        <thead>
                            <tr>
                                <th>Filename</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="doc_table" ></tbody>
                    </table> 
                </div>
                <div class="flex flex-row gap-2 mt-6 w-full">
                    <label for="doc">Upload document</label>
                    <input type="file" id="doc" class="w-32" onchange="sendDocument()">
                </div>
            </div>
        </div>
    </div>
    <script>
        side_bar.addEventListener("click", () => {
            workspace.classList.toggle('hidden')
            if (window.screen.width < 600) {
                r_col.classList.toggle("hidden")
            }
        });

        upload.addEventListener("click", () => {
            upd.classList.toggle('hidden')
        });
        
        close_upd.addEventListener("click", () => 
            upd.classList.add("hidden"));
    </script>
    <script src="./script.js"></script>
</body>
</html>
